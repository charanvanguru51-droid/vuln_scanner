<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Vulnerability Scan Report</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f7fb;
            margin: 30px;
        }

        h1 {
            text-align: center;
            color: #1f4e79;
        }

        h2 {
            color: #0b6fa4;
            border-bottom: 2px solid #ddd;
            padding-bottom: 5px;
        }

        .info {
            background: white;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 8px;
            box-shadow: 0px 0px 8px rgba(0,0,0,0.1);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            margin-top: 15px;
            margin-bottom: 30px;
            box-shadow: 0px 0px 8px rgba(0,0,0,0.1);
        }

        th {
            background: #1f4e79;
            color: white;
            padding: 12px;
        }

        td {
            padding: 10px;
            border: 1px solid #ddd;
            text-align: center;
        }

        tr:nth-child(even) {
            background: #f9f9f9;
        }

        .safe {
            color: green;
            font-weight: bold;
        }

        .warn {
            color: red;
            font-weight: bold;
        }

        footer {
            text-align: center;
            margin-top: 30px;
            color: gray;
        }
    </style>

</head>

<body>

<h1>Network Vulnerability Scan Report</h1>





<div class="info">

<h2>192.168.43.110</h2>

<p><strong>Hostname:</strong> I2223</p>

<p><strong>Status:</strong> up</p>

<p><strong>Operating System:</strong> Unknown</p>

<p><strong>Open Ports:</strong> 1</p>

</div>

<table>

<tr>
    <th>Port</th>
    <th>Protocol</th>
    <th>Service</th>
    <th>Product</th>
    <th>Version</th>
    <th>State</th>
    <th>Vulnerability</th>
</tr>



<tr>

<td>5060</td>

<td>tcp</td>

<td>sip</td>

<td></td>

<td></td>

<td>filtered</td>

<td>

<span class="safe">
No obvious issues detected.
</span>

</td>

</tr>



</table>



<footer>

Generated by Python Vulnerability Scanner

</footer>

</body>
</html>
